<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pastel Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginPage" class="center">
  <div class="card">
    <h2>Login</h2>
    <input type="text" id="userId" placeholder="Masukkan ID">
    <button onclick="login()">Masuk</button>
  </div>
</div>

<div id="app" class="hidden">
  <aside>
    <h3>Menu</h3>
    <button onclick="showAdd()">Tambah Tugas</button>
    <button onclick="deleteLast()">Hapus Terakhir</button>
    <button onclick="showTasks()">Lihat Tugas</button>
    <button onclick="logout()">Logout</button>
  </aside>

  <main>
    <div id="content"></div>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
